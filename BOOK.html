<html> 
    <head>
          <title>B00K_0062_95</title>
            
<style>

@font-face {
    font-family: 'VintageMoon';
    src: url('fonts/Vintage\ Moon\ Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

body {
	overflow: hidden;
	font-family:  "WebPlus_IBM_VGA_8x16", Inconsolata, monospace;
	font-weight:normal;
	font-style:normal;
	font-size: 1em;
	color: #000000;
    background-color: #000000;
    background-image: url(https://media.giphy.com/media/4heseFMvObk9q/giphy.gif?cid=790b7611etr1sfv708fet09vvqdt7shpnxqvzmrcb5tw2nns&ep=v1_gifs_search&rid=giphy.gif&ct=g);
    cursor: url(cursors/point.cur), auto;
}


.crt-frame {
    pointer-events: none;
    overflow: hidden;
    z-index: 9000;
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: url(cursors/point.cur), auto;
}

.scanline {
    width: 100%;
    height: 100px;
    z-index: 8;
    background: linear-gradient(
        0deg,
        rgba(0, 0, 0, 0) 0%,
        rgba(255, 255, 255, 0.2) 10%,
        rgba(0, 0, 0, 0.1) 100%
    );
    opacity: 0.1;
    position: absolute;
    bottom: 100%;
    animation: scanline 10s linear infinite;
    pointer-events: none;	
}


@keyframes scanline {
    0% {
        bottom: 100%;
    }
    80% {
        bottom: 100%;
    }
    100% {
        bottom: 0%;
    }
}

.cristal {
    pointer-events: none;	
    overflow: hidden;
    position: fixed;
    z-index: 500;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
	opacity: 60%;
    cursor: url(cursors/point.cur), auto;

	background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 3px, 2px 100%;
	
}
/* INSIDE TV */

#screen {
    position: relative;
	background-image: url(https://media.giphy.com/media/4heseFMvObk9q/giphy.gif?cid=790b7611etr1sfv708fet09vvqdt7shpnxqvzmrcb5tw2nns&ep=v1_gifs_search&rid=giphy.gif&ct=g);
    background-color: #000000;
    padding: 5px 5px 5px 5px;
    width: 92%;
    height: 90%;
    margin-left: auto;
    margin-right: auto;
    margin-top: 2%;
    margin-bottom: auto;
    overflow: hidden;
    cursor: url(cursors/point.cur), auto;
    font-family: "WebPlus_IBM_VGA_8x16", Inconsolata, monospace;
	font-size: 24px;
	text-shadow: 0 0 5px #707070;
	animation: textShadow 0.15s infinite;
    cursor: url(cursors/point.cur), auto;
}

        .wrapper {
    width: 93%;
    height: 93%; 
    margin-left: auto;
    margin-right: auto;
    margin-top: auto;
    margin-bottom: auto;
    background-color: rgb(0, 0, 0);
    background-image: url(images/blurbg.png);
    filter: sepia(20%) brightness(90%) hue-rotate(35deg) saturate(110%) contrast(90%);
    background-size: cover; 
    background-position: top left; 
    background-repeat: no-repeat; 
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
    display: flex;
        justify-content: center;
        align-items: center;
}

nav {
        position: relative;
        width: 100%;
        height: 5px;
        background-color: #000000;
        color: rgb(0, 0, 0);
        margin: 10px 0px 8px 0px;
        padding: 12px 0;
        display: flex;
        justify-content: center;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      nav a {
        margin: 0 16px;
        padding: 6px;
        color: #1fc708;
        text-decoration: none;
        font-family: 'VintageMoon', sans-serif;
        background-color: #000000;
        letter-spacing: 1px;
        text-align: center;
        height: 50px;
        width: 70px;
        font-weight: bold;
        transition: color 0.3s ease;
        z-index: 5;
        transform: translate(0px, -12px) !important;
      }

      nav a:hover {
        color: #ffffff;
        cursor: url(cursors/point.cur), auto;
      }

      marquee {
        position: absolute;
        color: #1fc708;
        opacity: 30%;
        top: 0px;
        left: 0;
        width: 100%;
        background-color: transparent;
        font-size: 24px;
        z-index: 0; 
        pointer-events: none;	
        animation: textShadow 3s infinite;
}
        img {
            position: absolute;
            display: block;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease; /* Add smooth transitions */
        }

        #backbutton {
        position: absolute;
        top: 5% !important;
        left: 4.5% !important;
        cursor: url(cursors/point.cur), auto;
}

#backbutton img { 
  width: 200px;
  height: auto;
  z-index: 2;
  filter: sepia(20%) brightness(90%) hue-rotate(35deg) saturate(120%) contrast(101%);
  cursor: url(cursors/point.cur), auto;
}
    button:hover img {
      transform: scale(1.1); /* Zoom in on hover */
      cursor: url(cursors/point.cur), auto;
    }

    #cover {
        margin-top: 2%;
        margin-bottom: auto;
        margin-left: auto;
        margin-right: auto;
        border-radius: 15px;
        padding: 20px 20px 20px 20px !important;
        width: 75%;
        height: 85%;
        background-color: #335e3c;
        display: flex;
        justify-content: center;
        align-items: center;
      }

#paper {
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        width: 98%;
        height: 95%;
        background-color: rgb(255, 255, 255);
        padding-top: 20px;
        padding-bottom: 20px;
      }

      .grid-container {
  display: grid;
  width: 100%;
  height: 100%;
  grid-template-columns: 1fr 1fr; /* only two columns  */
  gap: 10px; /* little bit of space between the papers */
  padding: 20px;
}

.grid-item {
            width: 100%;
            height: 100%; 
            position: relative;
            overflow: visible; /* shows the edges of the paper that hang over the div */
            background-image: url(images/paper.png);
            background-color: #f0f0f0;
            text-align: center;
}

#left{
  height: 110%;
  width: auto;
  top: 5px;
  transform: translateX(-10%); /* wanted it to be off the paper a little bit */
  rotate: 2deg;
  filter: brightness(90%);
  cursor: url(cursors/point.cur), auto;
}

#right {
  height: 105%;
  width: auto;
  top: 5px;
  filter: brightness(90%);
  cursor: url(cursors/point.cur), auto;
}
    </style>
</style>
        </head>
        <body>
            <img class="crt-frame" src="images/crt.png">
            <div id="screen"> 

                <nav>

                    <marquee> 01000111 01000101 01010100 00100000 01001101 01000101 00100000 01001111 01010101 01010100 00100000 01001111 01000110 00100000 01001000 01000101 01010010 01000101 </marquee>

                    <a href="#home">Buttons</a>
                    <a href="#about">Don't</a>
                    <a href="#contact">Work</a>
                  </nav>

                  <button id="backbutton" style="border: black; padding: 0; background: none; width: 20%;" onclick="window.location.href='HOME.html'">
                    <img src="images/backbutton.png" style="transition: transform 0.3s;">
                  </button> 
              
                <div class="wrapper">

                    <div id="cover"> <!-- book cover -->
                        <div id="paper"> <!-- paper inside the cover -->
                      
                          <div class="grid-container">
                            <div class="grid-item"><img src="images/note1.png" id="left"></div> <!-- paper on the left side -->
                            <div class="grid-item"><img src="images/note2.png" id="right"></div> <!-- paper on the right side -->
                          </div>
                      
                      </div>
                      </div>
                      
                </div>
              <div class="scanline"></div>
              <img class="cristal" id="image" src="images/dust.png" style="position: fixed; left:0; top:0">
          </div>


          </body>
</html>
