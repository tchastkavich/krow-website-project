.scanline { /* this is the vcr line that scrolls down the screen */
    width: 100%;
    height: 100px;
    z-index: 8;
    background: linear-gradient(
        0deg,
        rgba(0, 0, 0, 0) 0%,
        rgba(255, 255, 255, 0.2) 10%,
        rgba(0, 0, 0, 0.1) 100%
    );
    opacity: 0.1;
    position: absolute;
    bottom: 100%;
    animation: scanline 10s linear infinite;
    pointer-events: none;	
}


@keyframes scanline {
    0% {
        bottom: 100%;
    }
    80% {
        bottom: 100%;
    }
    100% {
        bottom: 0%;
    }
}

.cristal { /* this makes the lines on the screen */

#screen {
    position: relative;

        .wrapper { /* this is the "room" inside the tv */
    width: 93%;
    height: 93%; 
    margin-left: auto;
    margin-right: auto;
    margin-top: auto;
    margin-bottom: auto;
    background-color: rgb(0, 0, 0);
    background-image: url(images/indexbg.png);
    filter: sepia(20%) brightness(120%) hue-rotate(35deg) saturate(120%) contrast(101%);
    background-size: cover; 
    background-position: top left; 
    background-repeat: no-repeat; 
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
}

nav { /* THE BUTTONS DONT LEAD ANYWHERE SORRY. i just put it in so that i could get the menu mark */
        position: relative;
        width: 100%;
        height: 5px;
        background-color: #000000;
        color: rgb(0, 0, 0);
        margin: 10px 0px 8px 0px;
        padding: 12px 0;
        display: flex;
        justify-content: center;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      nav a {
        margin: 0 16px;
        padding: 6px;
        color: #1fc708;
        text-decoration: none;
        font-family: 'VintageMoon', sans-serif;
        background-color: #000000;
        letter-spacing: 1px;
        text-align: center;
        height: 50px;
        width: 70px;
        font-weight: bold;
        transition: color 0.3s ease;
        z-index: 5;
        transform: translate(0px, -12px) !important;
      }

      nav a:hover {
        color: #ffffff;
        cursor: url(cursors/point.cur), auto;
      }

      marquee { /* scrolly thing that goes across the menu. the binary says "help me" or something similar */
        position: absolute;
        color: #1fc708;
        opacity: 30%;
        top: 0px;
        left: 0;
        width: 100%;
        background-color: transparent;
        font-size: 24px;
        z-index: 0; 
        pointer-events: none; /* so that it doesnt change the cursor to the text one when its hovered on */
        animation: textShadow 3s infinite;
}
        img {
            position: absolute;
            display: block;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
