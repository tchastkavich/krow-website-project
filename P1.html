                <div class="wrapper">
                    <img src="images/poster1.jpg" id="tiltingImage" alt="Tilted Image" style="width: 24%; height: auto;">

                    <script>
                        const image = document.getElementById('tiltingImage');
                    
                    image.addEventListener('mousemove', (e) => {
                      // get the position of the mouse 
                      const rect = image.getBoundingClientRect(); //relative to the image
                      const x = e.clientX - rect.left; // x position on the poster
                      const y = e.clientY - rect.top;  // y position on the poster

                      // make it tilt a certain amount
                      const xPercent = (x / rect.width) - 0.5; // -0.5 to 0.5 range
                      const yPercent = (y / rect.height) - 0.5; // also -0.5 to 0.5 range
                    
                      const tiltFactor = 30; // make it higher for a more dramatic tilt amount
                      const rotateX = yPercent * tiltFactor;
                      const rotateY = -xPercent * tiltFactor;
                    
                      // applys the tilt to the picture
                      image.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                    });
                    
                    // makes the image normal again after you stop hovering on it
                    image.addEventListener('mouseleave', () => {
                      image.style.transform = 'rotateX(0deg) rotateY(0deg)';
                    });
                    </script>
